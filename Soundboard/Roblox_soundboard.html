
        

<!doctype html>
<html>
<head>
    <title>Soundboard - ScriptBox</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000814;
            color: #00ff99;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }
        #ui-layer {
            position: relative;
            z-index: 10;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #ff00ff;
            padding-bottom: 20px;
        }
        .header a {
            color: #ff00ff;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .header a:hover {
            color: #00ff99;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            padding: 20px;
        }
        .sound-card {
            background: rgba(8, 31, 68, 0.6);
            border: 2px solid #00ff99;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .sound-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 15px #ff00ff;
        }
        .play-btn {
            background: #ff00ff;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            margin-bottom: 15px;
            box-shadow: 0 4px 0 #b300b3;
            transition: all 0.1s;
            position: relative;
        }
        .play-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #b300b3;
        }
        .play-btn::after {
            content: '';
            display: inline-block;
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid white;
            margin-left: 5px;
        }
        .label-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .sound-name {
            font-size: 14px;
            color: #00ff99;
            font-weight: bold;
        }
        .download-icon {
            color: #ff00ff;
            text-decoration: none;
            font-size: 20px;
            transition: color 0.2s;
        }
        .download-icon:hover {
            color: #ffffff;
        }
        @media (max-width: 900px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="header">
            <a href="../index.html">Main Board</a>
            <a href="index.html">Soundboard</a>
            <a href="../More Section/index.html">More Section</a>
        </div>
        
        <h1 style="text-align: center; margin-bottom: 50px; text-shadow: 0 0 10px #00ff99;">SOUNDBOARD</h1>

        <div class="grid-container">
            <div class="sound-card">
                <button class="play-btn" onclick="playSound('../assets/sounds/Among us/AMB_Admin.wav')"></button>
                <div class="label-container">
                    <span class="sound-name"> AMB OOF</span>
                    <a href="../assets/sounds/Roblox/AMB_Admin.wav" download="AMB ADMIN" class="download-icon" title="Download on Class-Soundboards.github.io">⤓</a>
                </div>
            </div>

            <div class="sound-card">
                <button class="play-btn" onclick="playSound('../assets/sounds/Among us/AMB_Bathroom.wav')"></button>
                <div class="label-container">
                    <span class="sound-name">AMB Nom Nom om</span>
                    <a href="../assets/sounds/Roblox/AMB_Nom Nom Nom.wav" download="AMB_Bathroom.wav" class="download-icon" title="Class-soundboard.github.io">⤓</a>
                </div>
            </div>

            <div class="sound-card">
                <button class="play-btn" onclick="playSound('../assets/sounds/Roblox /AMB_HI.wav')"></button>
                <div class="label-container">
                    <span class="sound-name">AMB HI</span>
                    <a href="../assets/sounds/Roblox/AMB_HI.wav" download="AMB_HI.wav" class="download-icon" title="Download on Class-soundboards.github.io">⤓</a>
                </div>
            </div>

            <div class="sound-card">
                <button class="play-btn" onclick="playSound('path/to/sound4.mp3')"></button>
                <div class="label-container">
                    <span class="sound-name">SOUND_PLACEHOLDER_4</span>
                    <a href="path/to/sound4.mp3" download="Sound4_ScriptBox" class="download-icon" title="Download on ScriptBox">⤓</a>
                </div>
            </div>

            <div class="sound-card">
                <button class="play-btn" onclick="playSound('path/to/sound5.mp3')"></button>
                <div class="label-container">
                    <span class="sound-name">SOUND_PLACEHOLDER_5</span>
                    <a href="path/to/sound5.mp3" download="Sound5_ScriptBox" class="download-icon" title="Download on ScriptBox">⤓</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentAudio = null;

        function playSound(path) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            currentAudio = new Audio(path);
            currentAudio.play().catch(e => {
                console.log("Placeholder path active. Replace 'path/to/sound.mp3' with real file.");
            });
        }
    </script>
</body>
</html>
